<!DOCTYPE html>
<html th:lang="${currentLocaleTag}" lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar(pageTitle, pageSubtitle)" data-shell-topbar class="sc-shell-topbar h-16 flex items-center justify-between px-6 lg:px-8 z-10 sticky top-0">
    <div class="flex items-center gap-3 min-w-0">
        <div class="min-w-0">
            <h1 th:attr="data-page-title=${pageTitle}" class="sc-topbar-title truncate" th:text="${pageTitle}">[[#{page.placeholder.title}]]</h1>
            <p th:if="${pageSubtitle != null and !#strings.isEmpty(pageSubtitle)}"
               class="sc-topbar-subtitle truncate mt-0.5"
               th:text="${pageSubtitle}">[[#{page.placeholder.subtitle}]]</p>
        </div>
    </div>

    <div class="flex items-center gap-3 lg:gap-4">
        <label for="topbar-language-select" class="sr-only" th:text="#{language.switcher.label}">Language</label>
        <select id="topbar-language-select"
                data-language-select
                class="sc-language-select"
                th:aria-label="#{language.switcher.label}"
                aria-label="Language">
            <option value="zh-CN" th:selected="${currentLocaleTag == 'zh-CN'}" th:text="#{language.zhCN}">简体中文</option>
            <option value="en-US" th:selected="${currentLocaleTag == 'en-US'}" th:text="#{language.enUS}">English</option>
        </select>

        <button id="theme-toggle" type="button" class="sc-btn-icon" th:aria-label="#{topbar.themeToggle}" aria-label="Toggle theme">
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="10" cy="10" r="3.25" stroke="currentColor" stroke-width="1.5"></circle>
                <path d="M10 2.5V4.25M10 15.75V17.5M17.5 10H15.75M4.25 10H2.5M15.303 4.697l-1.237 1.237M15.303 15.303l-1.237-1.237M5.934 14.066l-1.237 1.237M5.934 5.934 4.697 4.697"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"></path>
            </svg>
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>

        <span class="hidden md:block text-sm font-medium text-[var(--sc-text-body)]" th:text="${displayName}">admin</span>

        <form th:action="@{/logout}" method="post" class="inline-flex items-center">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="sc-btn-secondary px-4 py-2 text-sm" th:text="#{topbar.logout}">
                Sign out
            </button>
        </form>
    </div>
</header>
</body>
</html>
