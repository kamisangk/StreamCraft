<!DOCTYPE html>
<html th:lang="${currentLocaleTag}" lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activeNav)" data-shell-sidebar class="sc-shell-sidebar w-64 flex flex-col z-20 relative">
    <div class="h-16 flex items-center px-6 border-b border-[var(--sc-border-soft)]">
        <img th:src="@{/brand-logo.png}" src="/brand-logo.png" alt="StreamCraft"
             class="h-9 w-9 rounded-xl object-cover ring-1 ring-black/5 mr-3">
        <span class="text-lg font-semibold tracking-tight text-[var(--sc-text)]">StreamCraft</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1 sc-scroll">
        <a th:href="@{/main}"
           data-nav-key="pipeline-monitor"
           th:attr="aria-current=${activeNav == 'pipeline-monitor'} ? 'page' : null"
           class="sc-nav-link"
           th:classappend="${activeNav == 'pipeline-monitor'} ? ' sc-nav-link-active' : ''">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"></path>
            </svg>
            <span th:text="#{nav.pipelineMonitor}">Task Monitor</span>
        </a>

        <a th:href="@{/pipelines}"
           data-nav-key="pipelines"
           th:attr="aria-current=${activeNav == 'pipelines'} ? 'page' : null"
           class="sc-nav-link"
           th:classappend="${activeNav == 'pipelines'} ? ' sc-nav-link-active' : ''">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
            </svg>
            <span th:text="#{nav.pipelines}">Pipelines</span>
        </a>

        <a th:href="@{/runtime-target}"
           data-nav-key="runtime-target"
           th:attr="aria-current=${activeNav == 'runtime-target'} ? 'page' : null"
           class="sc-nav-link"
           th:classappend="${activeNav == 'runtime-target'} ? ' sc-nav-link-active' : ''">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
            </svg>
            <span th:text="#{nav.runtimeTarget}">Flink</span>
        </a>

        <a th:href="@{/settings}"
           data-nav-key="settings"
           th:attr="aria-current=${activeNav == 'settings'} ? 'page' : null"
           class="sc-nav-link"
           th:classappend="${activeNav == 'settings'} ? ' sc-nav-link-active' : ''">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span th:text="#{nav.settings}">Settings</span>
        </a>
    </nav>

    <div class="px-4 py-4 border-t border-[var(--sc-border-soft)] text-xs text-[var(--sc-muted)]">
        StreamCraft v1.0.0-beta
    </div>
</aside>
</body>
</html>
