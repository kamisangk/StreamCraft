# =============================================================================
# Server / 服务
# =============================================================================
# 服务监听端口。/ HTTP server port.
server.port=${SERVER_PORT:8080}
# Spring Boot 应用名称。/ Spring Boot application name.
spring.application.name=streamcraft-service
# Thymeleaf 模板缓存开关，部署包默认开启。/ Thymeleaf template cache switch; enabled by default in packaged deployments.
spring.thymeleaf.cache=${STREAMCRAFT_THYMELEAF_CACHE:true}

# =============================================================================
# Database / 数据库
# =============================================================================
# 数据库类型，支持 sqlite 或 mysql。/ Database type. Supported values: sqlite or mysql.
streamcraft.datasource.type=${STREAMCRAFT_DATASOURCE_TYPE:sqlite}
# 数据库连接地址。部署包 SQLite 默认使用 data 目录。/ Database connection URL. Packaged SQLite deployments default to the data directory.
spring.datasource.url=${STREAMCRAFT_DATASOURCE_URL:jdbc:sqlite:${STREAMCRAFT_DATA_DIR:./data}/streamcraft-service.db}
# JPA 表结构处理策略，开发期默认自动更新。/ JPA schema strategy; defaults to update for development.
spring.jpa.hibernate.ddl-auto=${STREAMCRAFT_JPA_DDL_AUTO:update}
# 禁用 Open Session in View，避免 Web 层隐式持有数据库会话。/ Disable Open Session in View to avoid implicit DB sessions in the web layer.
spring.jpa.open-in-view=false
# 数据库连接池最大连接数。/ Maximum database connection pool size.
spring.datasource.hikari.maximum-pool-size=${STREAMCRAFT_DATASOURCE_POOL_SIZE:1}
# SQLite busy timeout，单位毫秒；MySQL 可忽略。/ SQLite busy timeout in milliseconds; ignored by MySQL.
spring.datasource.hikari.data-source-properties.busy_timeout=${STREAMCRAFT_SQLITE_BUSY_TIMEOUT:10000}

# =============================================================================
# Security / 安全
# =============================================================================
# Remember-me 密钥，生产环境必须配置固定值。/ Remember-me key; configure a stable value in production.
streamcraft.auth.remember-me-key=${STREAMCRAFT_AUTH_REMEMBER_ME_KEY:}
# Remember-me 有效期，单位秒。/ Remember-me validity period in seconds.
streamcraft.auth.remember-me-validity-seconds=${STREAMCRAFT_AUTH_REMEMBER_ME_VALIDITY_SECONDS:1209600}
# 内部服务调用令牌。/ Token for internal service calls.
streamcraft.internal.token=${STREAMCRAFT_INTERNAL_TOKEN:streamcraft-local-internal-token}
# 内部服务调用令牌请求头名称。/ Header name used to pass the internal service token.
streamcraft.internal.header-name=${STREAMCRAFT_INTERNAL_HEADER_NAME:X-StreamCraft-Internal-Token}

# =============================================================================
# Logging / 日志
# =============================================================================
# 应用日志文件路径。/ Application log file path.
logging.file.name=${STREAMCRAFT_LOG_FILE:${STREAMCRAFT_LOG_DIR:./logs}/streamcraft-service.log}
# 根日志级别。/ Root logging level.
logging.level.root=${STREAMCRAFT_LOG_LEVEL:INFO}
# 单个日志文件最大大小。/ Maximum size of a single log file.
logging.logback.rollingpolicy.max-file-size=${STREAMCRAFT_LOG_MAX_FILE_SIZE:100MB}
# 日志文件保留天数。/ Number of days to retain rolled log files.
logging.logback.rollingpolicy.max-history=${STREAMCRAFT_LOG_MAX_HISTORY:30}
# 所有归档日志总大小上限。/ Total size cap for archived log files.
logging.logback.rollingpolicy.total-size-cap=${STREAMCRAFT_LOG_TOTAL_SIZE_CAP:2GB}

# =============================================================================
# Flink / Flink
# =============================================================================
# core 任务包路径，部署包默认指向 flink-libs 目录。/ Path to the core job jar; packaged deployments default to the flink-libs directory.
streamcraft.flink.core-jar-path=${STREAMCRAFT_CORE_JAR_PATH:./flink-libs/streamcraft-core.jar}
# Flink REST 连接超时时间。/ Flink REST connection timeout.
streamcraft.flink.connect-timeout=${STREAMCRAFT_FLINK_CONNECT_TIMEOUT:2s}
# Flink REST 读取超时时间。/ Flink REST read timeout.
streamcraft.flink.read-timeout=${STREAMCRAFT_FLINK_READ_TIMEOUT:3s}

# =============================================================================
# Runtime Target / 运行目标
# =============================================================================
# 运行目标健康检查间隔，单位毫秒。/ Runtime target health-check interval in milliseconds.
streamcraft.runtime-target.validation-interval=${STREAMCRAFT_RUNTIME_TARGET_VALIDATION_INTERVAL:5000}

# =============================================================================
# Pipeline Runtime / 管道运行时
# =============================================================================
# Service 基础 URL，Flink 任务回调/访问 service 时使用。/ Base service URL used by Flink jobs for callbacks or service access.
streamcraft.pipeline.runtime.service-base-url=${STREAMCRAFT_SERVICE_BASE_URL:http://localhost:8080}
# Pipeline 运行时测试模式开关。/ Pipeline runtime test-mode switch.
streamcraft.pipeline.runtime.test-mode=${STREAMCRAFT_PIPELINE_RUNTIME_TEST_MODE:false}
# Pipeline 默认并行度。/ Default pipeline parallelism.
streamcraft.pipeline.runtime.parallelism=${STREAMCRAFT_PIPELINE_PARALLELISM:1}
